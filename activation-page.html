<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Intrlock Setup</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:linear-gradient(135deg,#0f2440,#081829);color:#fff;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}.logo{font-size:48px;font-weight:800;margin-bottom:8px}.sub{font-size:18px;color:rgba(255,255,255,.5);margin-bottom:48px}.inst{font-size:20px;font-weight:600;margin-bottom:12px}.det{font-size:14px;color:rgba(255,255,255,.4);max-width:400px;line-height:1.6}.mac{font-family:monospace;font-size:14px;color:rgba(255,255,255,.3);margin-top:24px;animation:p 2s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.5}}</style></head>
<body><div class="logo">Intrlock</div><div class="sub">Intercom Panel</div><div class="inst">Device Ready for Activation</div><div class="det">Open <strong>app.intrlock.io</strong> to activate this device</div><div class="mac" id="m"></div>
<script>fetch('config.json').then(r=>r.json()).then(d=>{document.getElementById('m').textContent='MAC: '+d.mac_address+' | ID: '+d.device_id}).catch(()=>{});setInterval(()=>{fetch('config.json').then(r=>r.json()).then(d=>{if(d.activated&&d.kiosk_url)location.href=d.kiosk_url}).catch(()=>{})},10000)</script></body></html>
