AWSTemplateFormatVersion: '2010-09-09'
Description: Intrlock Bridge Camera Relay - MediaMTX on EC2

Parameters:
  KeyPairName:
    Type: String
    Description: EC2 key pair for SSH access (leave empty to skip SSH)
    Default: ''
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small]

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

Resources:
  RelaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Intrlock camera relay ports
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8554
          ToPort: 8554
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8889
          ToPort: 8889
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8888
          ToPort: 8888
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 8189
          ToPort: 8189
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 9997
          ToPort: 9997
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: intrlock-camera-relay

  RelayInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      SecurityGroups:
        - !Ref RelaySecurityGroup
      Tags:
        - Key: Name
          Value: intrlock-camera-relay
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -ex
          cd /opt
          curl -sSL "https://github.com/bluenviron/mediamtx/releases/download/v1.9.0/mediamtx_v1.9.0_linux_amd64.tar.gz" -o mediamtx.tar.gz
          tar xzf mediamtx.tar.gz
          rm mediamtx.tar.gz
          chmod +x mediamtx
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60")
          PUBLIC_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
          echo "logLevel: info" > /opt/mediamtx.yml
          echo "api: yes" >> /opt/mediamtx.yml
          echo "apiAddress: 0.0.0.0:9997" >> /opt/mediamtx.yml
          echo "rtsp: yes" >> /opt/mediamtx.yml
          echo "rtspAddress: :8554" >> /opt/mediamtx.yml
          echo "webrtc: yes" >> /opt/mediamtx.yml
          echo "webrtcAddress: :8889" >> /opt/mediamtx.yml
          echo "hls: yes" >> /opt/mediamtx.yml
          echo "hlsAddress: :8888" >> /opt/mediamtx.yml
          echo "webrtcICEUDPMuxAddress: :8189" >> /opt/mediamtx.yml
          echo "webrtcICEHostNAT1To1IPs: [$PUBLIC_IP]" >> /opt/mediamtx.yml
          echo "paths:" >> /opt/mediamtx.yml
          echo "  cam:" >> /opt/mediamtx.yml
          echo "    source: publisher" >> /opt/mediamtx.yml
          printf '[Unit]\nDescription=MediaMTX Camera Relay\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nExecStart=/opt/mediamtx /opt/mediamtx.yml\nRestart=always\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/mediamtx.service
          systemctl daemon-reload
          systemctl enable mediamtx
          systemctl start mediamtx

Outputs:
  PublicIP:
    Description: Relay server public IP
    Value: !GetAtt RelayInstance.PublicIp
  WebRTCUrl:
    Description: View live stream (WebRTC - low latency)
    Value: !Sub 'http://${RelayInstance.PublicIp}:8889/cam'
  HLSUrl:
    Description: View live stream (HLS - browser compatible)
    Value: !Sub 'http://${RelayInstance.PublicIp}:8888/cam'
  RTSPUrl:
    Description: RTSP endpoint (Pi pushes here)
    Value: !Sub 'rtsp://${RelayInstance.PublicIp}:8554/cam'
